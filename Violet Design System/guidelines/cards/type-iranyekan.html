<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--vt-font-sans);background:var(--vt-color-surface);padding:22px 28px;color:var(--vt-color-text)}
  .head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
  .head h2{font-family:var(--vt-font-fa);font-weight:700;font-size:20px;color:var(--vt-color-text-strong);margin:0;direction:rtl}

  .w{width:130px;flex:none;font:500 11px var(--vt-font-mono);color:var(--vt-color-text-subtle)}
  .ex{flex:1;text-align:right;font-family:var(--vt-font-fa);font-size:23px;color:var(--vt-color-text-strong);direction:rtl;line-height:1.4;white-space:nowrap}

<body>
  <div class="head">

  <div class="row"><span class="w">Light · 300</span><span class="ex" style="font-weight:300">نمایندگی رسمی فروش عمده</span></div>

  <div class="row"><span class="w">Black · 900</span><span class="ex" style="font-weight:900">نمایندگی رسمی فروش عمده</span></div>
