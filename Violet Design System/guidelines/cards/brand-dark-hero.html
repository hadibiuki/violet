<!-- @dsCard group="Colors" viewport="700x200" name="Dark celestial · hero register" subtitle="ink-950 gradient + aurora + gold — the brand's second surface" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--vt-font-sans);padding:0}
  .hero{position:relative;height:200px;overflow:hidden;display:flex;align-items:center;padding:0 30px;
    background:radial-gradient(700px 400px at 72% 30%,#3B0764 0%,transparent 60%),linear-gradient(160deg,#0D0A1E,#18122B 55%,#1c0f3a)}
  .aurora{position:absolute;inset:-20%;background:
    radial-gradient(360px 240px at 20% 30%,rgba(168,85,247,.30),transparent 60%),
    radial-gradient(300px 300px at 82% 70%,rgba(124,58,237,.26),transparent 60%),
    radial-gradient(240px 240px at 60% 20%,rgba(201,168,106,.14),transparent 60%);filter:blur(8px)}
  .c{position:relative;z-index:2;color:#fff}
  .eyebrow{font:500 12px var(--vt-font-sans);letter-spacing:.26em;text-transform:uppercase;color:var(--vt-gold-300)}
  h1{font-family:var(--vt-font-display);font-weight:300;font-size:40px;line-height:1.04;margin:8px 0 0;letter-spacing:-.02em}
  h1 em{font-style:italic;color:#C4B5FD}
</style></head>
<body>
  <div class="hero">
    <div class="aurora"></div>
    <div class="c">
      <span class="eyebrow">New Season · 2026</span>
      <h1>Timeless,<br>reimagined for <em>now</em></h1>
    </div>
  </div>
</body></html>
