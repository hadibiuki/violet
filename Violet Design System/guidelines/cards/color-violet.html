<!-- @dsCard group="Colors" viewport="700x172" name="Brand · Violet ramp" subtitle="violet-50 → 950 · brand core (600 is primary)" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--vt-font-sans);background:var(--vt-color-bg);padding:20px 24px}
  .row{display:flex;gap:0;border-radius:var(--vt-radius-md);overflow:hidden;box-shadow:var(--vt-shadow-sm)}
  .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:8px;color:#fff;font:500 11px var(--vt-font-mono)}
  .sw.dk{color:var(--vt-ink-900)}
  .cap{margin-top:12px;font:500 12px var(--vt-font-sans);color:var(--vt-color-text-muted);letter-spacing:.02em}
  .cap b{color:var(--vt-color-text-strong);font-weight:600}
</style></head>
<body>
  <div class="row">
    <div class="sw dk" style="background:var(--vt-violet-50)">50</div>
    <div class="sw dk" style="background:var(--vt-violet-100)">100</div>
    <div class="sw dk" style="background:var(--vt-violet-200)">200</div>
    <div class="sw dk" style="background:var(--vt-violet-300)">300</div>
    <div class="sw" style="background:var(--vt-violet-400)">400</div>
    <div class="sw" style="background:var(--vt-violet-500)">500</div>
    <div class="sw" style="background:var(--vt-violet-600)">600</div>
    <div class="sw" style="background:var(--vt-violet-700)">700</div>
    <div class="sw" style="background:var(--vt-violet-800)">800</div>
    <div class="sw" style="background:var(--vt-violet-900)">900</div>
    <div class="sw" style="background:var(--vt-violet-950)">950</div>
  </div>
  <div class="cap"><b>--vt-color-primary</b> = violet-600 #7C3AED · the one brand action. Use 700+ for text on white.</div>
</body></html>
