<!-- @dsCard group="Colors" viewport="700x180" name="Semantic roles" subtitle="pick by role, never by hex" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--vt-font-sans);background:var(--vt-color-bg);padding:20px 24px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .cell{border-radius:var(--vt-radius-md);overflow:hidden;border:1px solid var(--vt-color-border);background:var(--vt-color-surface)}
  .chip{height:48px}
  .lbl{padding:7px 9px;font:500 11px var(--vt-font-mono);color:var(--vt-color-text-muted);line-height:1.4}
  .lbl b{display:block;font-family:var(--vt-font-sans);font-size:12px;color:var(--vt-color-text-strong);margin-bottom:1px}
</style></head>
<body>
  <div class="grid">
    <div class="cell"><div class="chip" style="background:var(--vt-color-bg);border-bottom:1px solid var(--vt-color-border)"></div><div class="lbl"><b>bg</b>--vt-color-bg</div></div>
    <div class="cell"><div class="chip" style="background:var(--vt-color-surface);border-bottom:1px solid var(--vt-color-border)"></div><div class="lbl"><b>surface</b>--vt-color-surface</div></div>
    <div class="cell"><div class="chip" style="background:var(--vt-color-surface-sunken)"></div><div class="lbl"><b>sunken</b>surface-sunken</div></div>
    <div class="cell"><div class="chip" style="background:var(--vt-color-primary)"></div><div class="lbl"><b>primary</b>--vt-color-primary</div></div>
    <div class="cell"><div class="chip" style="background:var(--vt-color-accent)"></div><div class="lbl"><b>accent</b>--vt-color-accent</div></div>
    <div class="cell"><div class="chip" style="background:var(--vt-color-text)"></div><div class="lbl"><b>text</b>--vt-color-text</div></div>
    <div class="cell"><div class="chip" style="background:var(--vt-color-border)"></div><div class="lbl"><b>border</b>--vt-color-border</div></div>
    <div class="cell"><div class="chip" style="background:var(--vt-color-link)"></div><div class="lbl"><b>link</b>--vt-color-link</div></div>
  </div>
</body></html>
