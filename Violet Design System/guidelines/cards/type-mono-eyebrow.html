<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--vt-font-sans);background:var(--vt-color-surface);padding:22px 26px;display:flex;gap:48px;align-items:center}
  .mono{font-family:var(--vt-font-mono)}
  .sku{font-size:20px;font-weight:500;color:var(--vt-color-text-strong)}
  .sub{margin-top:6px;font:400 12px var(--vt-font-mono);color:var(--vt-color-text-muted)}
  .eyebrow{font:500 12px var(--vt-font-sans);letter-spacing:.26em;text-transform:uppercase;color:var(--vt-color-accent-strong)}
  .col span{display:block}
</style></head>
<body>
  <div class="col"><span class="mono sku">VLT-2601</span><span class="sub">JetBrains Mono · SKU</span></div>
  <div class="col"><span class="eyebrow">Just Arrived ✦</span><span class="sub" style="font-family:var(--vt-font-sans)">Inter 500 · 0.26em · uppercase · gold</span></div>
</body></html>
