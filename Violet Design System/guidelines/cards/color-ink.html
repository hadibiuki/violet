<!-- @dsCard group="Colors" viewport="700x172" name="Neutrals · Ink ramp" subtitle="violet-tinted greys · 60% of every screen" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--vt-font-sans);background:var(--vt-color-bg);padding:20px 24px}
  .row{display:flex;gap:0;border-radius:var(--vt-radius-md);overflow:hidden;box-shadow:var(--vt-shadow-sm);border:1px solid var(--vt-color-border)}
  .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:7px 6px;color:#fff;font:500 10.5px var(--vt-font-mono)}
  .sw.dk{color:var(--vt-ink-800)}
  .cap{margin-top:12px;font:500 12px var(--vt-font-sans);color:var(--vt-color-text-muted)}
  .cap b{color:var(--vt-color-text-strong);font-weight:600}
</style></head>
<body>
  <div class="row">
    <div class="sw dk" style="background:var(--vt-ink-50)">50</div>
    <div class="sw dk" style="background:var(--vt-ink-100)">100</div>
    <div class="sw dk" style="background:var(--vt-ink-150)">150</div>
    <div class="sw dk" style="background:var(--vt-ink-200)">200</div>
    <div class="sw dk" style="background:var(--vt-ink-300)">300</div>
    <div class="sw dk" style="background:var(--vt-ink-400)">400</div>
    <div class="sw" style="background:var(--vt-ink-500)">500</div>
    <div class="sw" style="background:var(--vt-ink-600)">600</div>
    <div class="sw" style="background:var(--vt-ink-700)">700</div>
    <div class="sw" style="background:var(--vt-ink-800)">800</div>
    <div class="sw" style="background:var(--vt-ink-900)">900</div>
    <div class="sw" style="background:var(--vt-ink-950)">950</div>
  </div>
  <div class="cap"><b>bg</b> = ink-50 · <b>text</b> = ink-900 · <b>muted</b> = ink-500 · <b>surface-inverse / hero</b> = ink-950.</div>
</body></html>
