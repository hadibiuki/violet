<!-- @dsCard group="Spacing" viewport="700x160" name="Radius scale" subtitle="sm chips · md buttons · lg cards · xl panels · pill" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--vt-font-sans);background:var(--vt-color-surface);padding:22px 26px;display:flex;gap:18px;align-items:flex-end}
  .u{display:flex;flex-direction:column;align-items:center;gap:9px}
  .box{width:66px;height:56px;background:var(--vt-color-primary-subtle);border:1.5px solid var(--vt-color-primary)}
  .n{font:500 10.5px var(--vt-font-mono);color:var(--vt-color-text-muted);text-align:center}
  .n b{display:block;font-family:var(--vt-font-sans);color:var(--vt-color-text-strong)}
</style></head>
<body>
  <div class="u"><div class="box" style="border-radius:var(--vt-radius-sm)"></div><span class="n"><b>sm</b>6 · chips</span></div>
  <div class="u"><div class="box" style="border-radius:var(--vt-radius-md)"></div><span class="n"><b>md</b>10 · button</span></div>
  <div class="u"><div class="box" style="border-radius:var(--vt-radius-lg)"></div><span class="n"><b>lg</b>14 · card</span></div>
  <div class="u"><div class="box" style="border-radius:var(--vt-radius-xl)"></div><span class="n"><b>xl</b>20 · panel</span></div>
  <div class="u"><div class="box" style="border-radius:var(--vt-radius-2xl)"></div><span class="n"><b>2xl</b>28 · feature</span></div>
  <div class="u"><div class="box" style="border-radius:var(--vt-radius-pill);width:56px;height:56px"></div><span class="n"><b>pill</b>avatar</span></div>
</body></html>
