<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="6xl → xs · display vs UI intent" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--vt-font-sans);background:var(--vt-color-surface);padding:18px 26px;color:var(--vt-color-text)}
  .l{display:flex;align-items:baseline;gap:16px;padding:5px 0;border-bottom:1px solid var(--vt-color-divider)}
  .l:last-child{border:none}
  .tok{width:120px;flex:none;font:500 11px var(--vt-font-mono);color:var(--vt-color-text-subtle)}
  .ex{color:var(--vt-color-text-strong);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .serif{font-family:var(--vt-font-display);font-weight:300;letter-spacing:-.02em}
</style></head>
<body>
  <div class="l"><span class="tok">6xl · 84 · serif</span><span class="ex serif" style="font-size:46px">Vitrine hero</span></div>
  <div class="l"><span class="tok">4xl · 48 · 600</span><span class="ex" style="font-size:34px;font-weight:600">Page title</span></div>
  <div class="l"><span class="tok">2xl · 28 · 600</span><span class="ex" style="font-size:24px;font-weight:600">Section heading</span></div>
  <div class="l"><span class="tok">xl · 22 · 500</span><span class="ex" style="font-size:21px;font-weight:500">Product name (PDP)</span></div>
  <div class="l"><span class="tok">base · 16 · 400</span><span class="ex" style="font-size:16px">Body copy — the default reading size.</span></div>
  <div class="l"><span class="tok">sm · 14 · 400</span><span class="ex" style="font-size:14px">App body & dense tables</span></div>
  <div class="l"><span class="tok">xs · 12 · 500</span><span class="ex" style="font-size:12px;font-weight:500">Captions · badges · SKU</span></div>
</body></html>
