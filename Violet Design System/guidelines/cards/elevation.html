<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation · violet-tinted shadows" subtitle="xs → 2xl · depth that feels on-brand" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--vt-font-sans);background:var(--vt-color-bg);padding:30px 26px;display:flex;gap:22px;align-items:center;justify-content:space-between}
  .u{display:flex;flex-direction:column;align-items:center;gap:12px}
  .box{width:78px;height:60px;background:var(--vt-color-surface);border-radius:var(--vt-radius-lg)}
  .n{font:500 10.5px var(--vt-font-mono);color:var(--vt-color-text-muted)}
</style></head>
<body>
  <div class="u"><div class="box" style="box-shadow:var(--vt-shadow-xs)"></div><span class="n">xs</span></div>
  <div class="u"><div class="box" style="box-shadow:var(--vt-shadow-sm)"></div><span class="n">sm</span></div>
  <div class="u"><div class="box" style="box-shadow:var(--vt-shadow-md)"></div><span class="n">md · card</span></div>
  <div class="u"><div class="box" style="box-shadow:var(--vt-shadow-lg)"></div><span class="n">lg · hover</span></div>
  <div class="u"><div class="box" style="box-shadow:var(--vt-shadow-xl)"></div><span class="n">xl · popover</span></div>
  <div class="u"><div class="box" style="box-shadow:var(--vt-shadow-2xl)"></div><span class="n">2xl · modal</span></div>
</body></html>
