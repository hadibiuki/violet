<!-- @dsCard group="Spacing" viewport="700x150" name="Motion · durations" subtitle="fast → slower · standard easing · collapses under reduced-motion" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--vt-font-sans);background:var(--vt-color-surface);padding:22px 26px}
  .row{display:flex;gap:30px}
  .u{flex:1}
  .track{height:8px;background:var(--vt-color-surface-sunken);border-radius:var(--vt-radius-pill);overflow:hidden;position:relative}
  .dot{position:absolute;top:0;left:0;height:8px;width:30%;border-radius:var(--vt-radius-pill);background:var(--vt-color-primary);animation:slide var(--d) var(--vt-ease-standard) infinite alternate}
  @keyframes slide{to{left:70%}}
  .n{margin-top:9px;font:500 11px var(--vt-font-mono);color:var(--vt-color-text-muted)}
  .n b{display:block;font-family:var(--vt-font-sans);color:var(--vt-color-text-strong);font-size:12px}
</style></head>
<body>
  <div class="row">
    <div class="u"><div class="track"><div class="dot" style="--d:120ms"></div></div><span class="n"><b>fast · 120ms</b>hovers, toggles</span></div>
    <div class="u"><div class="track"><div class="dot" style="--d:200ms"></div></div><span class="n"><b>base · 200ms</b>cards, tabs</span></div>
    <div class="u"><div class="track"><div class="dot" style="--d:320ms"></div></div><span class="n"><b>slow · 320ms</b>drawers, modals</span></div>
    <div class="u"><div class="track"><div class="dot" style="--d:600ms"></div></div><span class="n"><b>slower · 600ms</b>hero / gallery</span></div>
  </div>
</body></html>
