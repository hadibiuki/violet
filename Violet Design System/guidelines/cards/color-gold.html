<!-- @dsCard group="Colors" viewport="700x172" name="Accent · Gold ramp" subtitle="gold-50 → 600 · the one indulgence, used sparingly" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--vt-font-sans);background:var(--vt-color-bg);padding:20px 24px}
  .row{display:flex;gap:0;border-radius:var(--vt-radius-md);overflow:hidden;box-shadow:var(--vt-shadow-sm)}
  .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:8px;color:var(--vt-ink-950);font:500 11px var(--vt-font-mono)}
  .sw.lt{color:#fff}
  .cap{margin-top:12px;font:500 12px var(--vt-font-sans);color:var(--vt-color-text-muted)}
  .cap b{color:var(--vt-color-accent-strong);font-weight:600}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--vt-gold-50)">50</div>
    <div class="sw" style="background:var(--vt-gold-100)">100</div>
    <div class="sw" style="background:var(--vt-gold-200)">200</div>
    <div class="sw" style="background:var(--vt-gold-300)">300</div>
    <div class="sw" style="background:var(--vt-gold-400)">400</div>
    <div class="sw lt" style="background:var(--vt-gold-500)">500</div>
    <div class="sw lt" style="background:var(--vt-gold-600)">600</div>
  </div>
  <div class="cap"><b>--vt-color-accent</b> = gold-400 · eyebrows, hairlines, NEW/LIMITED flourish. <b>gold-600</b> for text (AA on white).</div>
</body></html>
