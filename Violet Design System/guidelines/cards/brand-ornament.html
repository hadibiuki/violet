<!-- @dsCard group="Brand" viewport="700x150" name="Brand ornament · sparkle & arrow" subtitle="✦ the signature glyph · → the forward action — the only ornaments (no emoji)" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--vt-font-sans);background:var(--vt-color-surface);padding:24px 28px;display:flex;gap:48px;align-items:center}
  .glyph{font-size:40px;line-height:1}
  .sparkle{color:var(--vt-color-accent-strong)}
  .arrow{color:var(--vt-color-primary)}
  .u{display:flex;align-items:center;gap:16px}
  .meta{font:500 12px var(--vt-font-mono);color:var(--vt-color-text-muted);line-height:1.5}
  .meta b{display:block;font-family:var(--vt-font-sans);color:var(--vt-color-text-strong);font-size:14px}
  .eyebrow{font:500 12px var(--vt-font-sans);letter-spacing:.26em;text-transform:uppercase;color:var(--vt-color-accent-strong)}
</style></head>
<body>
  <div class="u"><span class="glyph sparkle">✦</span><span class="meta"><b>Sparkle ✦</b>section ornament · gold</span></div>
  <div class="u"><span class="glyph arrow">→</span><span class="meta"><b>Arrow →</b>trails actions · slides on hover</span></div>
  <div class="u"><span class="eyebrow">New Season ✦</span></div>
</body></html>
