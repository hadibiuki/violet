<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;font-family:var(--vt-font-sans);background:var(--vt-color-bg);padding:26px}
  .grid{display:grid;grid-template-columns:240px 1fr;gap:32px;align-items:start}
  .lbl{font:500 11px var(--vt-font-mono);color:var(--vt-color-text-subtle);margin-bottom:12px}
  .card{background:var(--vt-color-surface);border:1px solid var(--vt-color-border);border-radius:var(--vt-radius-lg);padding:18px}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { OrderTimeline, CartLineItem, InvoiceRow } = window.VioletDesignSystem_7273c4;
  const u = (id) => `https://images.unsplash.com/${id}?auto=format&fit=crop&w=200&q=80`;
  const usd = (n) => '$' + n.toLocaleString();
  function Demo(){
    const [qty,setQty] = React.useState(20);
    React.useEffect(()=>{ if(window.lucide) lucide.createIcons(); });
    return (
      <div className="grid">
        <div><div className="lbl">ORDER TIMELINE</div>
          <div className="card"><OrderTimeline current="shipped" times={{submitted:'03/21 09:12',reviewing:'03/21 11:40',approved:'03/22 08:05',shipped:'03/23 14:30'}} /></div>
        </div>
        <div>
          <div className="lbl">CART LINE ITEM</div>
          <div className="card" style={{marginBottom:22}}>
            <CartLineItem name="Chronograph Classic 42" sku="VLT-2601" image={u('photo-1523275335684-37898b6baf30')} price={1250} qty={qty} moq={10} currency={usd} onQty={setQty} onRemove={()=>{}} />
          </div>
          <div className="lbl">INVOICE ROWS</div>
          <div className="card" style={{padding:0}}>
            <InvoiceRow header />
            <InvoiceRow description="Chronograph Classic 42" sku="VLT-2601" qty={20} unitPrice={1250} amount={25000} currency={usd} />
            <InvoiceRow description="Eclipse Dress 38" sku="VLT-1182" qty={25} unitPrice={980} amount={24500} currency={usd} />
            <InvoiceRow total description="Total" amount={49500} currency={usd} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
