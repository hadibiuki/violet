<!-- @dsCard group="Components" viewport="700x560" name="Display" subtitle="ProductCard · Badge · SpecTable · Chip · Avatar · StatTile · Divider" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;font-family:var(--vt-font-sans);background:var(--vt-color-bg);padding:24px 26px}
  .lbl{font:500 11px var(--vt-font-mono);color:var(--vt-color-text-subtle);margin-bottom:10px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:22px}
  .specwrap{background:var(--vt-color-surface);border:1px solid var(--vt-color-border);border-radius:var(--vt-radius-lg);overflow:hidden;max-width:420px}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { ProductCard, Badge, SpecTable, IconButton, Chip, Avatar, StatTile, Divider } = window.VioletDesignSystem_7273c4;
  const u = (id) => `https://images.unsplash.com/${id}?auto=format&fit=crop&w=500&q=80`;
  function Demo(){
    React.useEffect(()=>{ if(window.lucide) lucide.createIcons(); });
    return (<>
      <div className="lbl">PRODUCT CARD — site (NEW) · featured (price) · B2B (price + MOQ + add) </div>
      <div className="grid">
        <ProductCard name="Chronograph Classic 42" sku="VLT-2601" badge="new" image={u('photo-1523275335684-37898b6baf30')} />
        <ProductCard name="Aurora Skeleton 42" sku="VLT-1180" badge="limited" image={u('photo-1495856458515-0637185db551')} price="$1,250" />
        <ProductCard name="Meridian GMT 43" sku="VLT-1181" image={u('photo-1612817159949-195b6eb9e31a')} price="$1,490" moq={10}
          action={<IconButton aria-label="Add to cart" variant="primary" icon={<i data-lucide="plus" style={{width:18,height:18}}></i>} />} />
      </div>
      <div style={{display:'flex',gap:32,flexWrap:'wrap',marginBottom:22}}>
        <div>
          <div className="lbl">CHIPS</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <Chip selected>Men</Chip><Chip>Gold</Chip><Chip onRemove={()=>{}}>Leather</Chip>
          </div>
        </div>
        <div>
          <div className="lbl">AVATARS</div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <Avatar name="Reza Karimi" /><Avatar name="Sara T" size="lg" />
          </div>
        </div>
        <div>
          <div className="lbl">BADGES</div>
          <div style={{display:'flex',gap:8}}><Badge variant="new"/><Badge variant="limited"/><Badge variant="soldout">Out of stock</Badge></div>
        </div>
      </div>
      <div className="lbl">STAT TILES</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:22}}>
        <StatTile label="Open orders" value="4" delta="2 this week" />
        <StatTile label="Monthly spend" value="$48.2k" delta="12%" />
        <StatTile label="Watch models" value="1000+" display />
      </div>
      <Divider label="specifications" />
      <div className="specwrap" style={{marginTop:16}}>
        <SpecTable rows={[
          ['Case Diameter','42 mm'],
          ['Case Material','Stainless Steel 316L'],
          ['Movement','Quartz Chronograph'],
          ['Water Resistance','5 ATM (50 m)'],
        ]} />
      </div>
    </>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
