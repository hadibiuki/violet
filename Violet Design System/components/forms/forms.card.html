<!-- @dsCard group="Components" viewport="700x660" name="Forms" subtitle="Button · IconButton · Input · Select · Checkbox · Radio · Switch · QuantityStepper · ImageUploader" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;font-family:var(--vt-font-sans);background:var(--vt-color-bg);padding:24px 26px}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
  .lbl{font:500 11px var(--vt-font-mono);color:var(--vt-color-text-subtle);width:100%;margin-bottom:-4px}
  .cols{display:flex;gap:32px;flex-wrap:wrap;align-items:flex-start}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Input, Select, Checkbox, Radio, Switch, QuantityStepper, ImageUploader } = window.VioletDesignSystem_7273c4;
  const Arr = () => <span>→</span>;
  const I = (n) => <i data-lucide={n} style={{width:18,height:18}}></i>;
  function Demo(){
    const [qty,setQty] = React.useState(10);
    const [chk,setChk] = React.useState(true);
    const [line,setLine] = React.useState('Classic');
    const [sw,setSw] = React.useState(true);
    const [country,setCountry] = React.useState('');
    const [imgs,setImgs] = React.useState([{id:'a',url:'../../assets/watches/watch-03.svg'},{id:'b',url:'../../assets/watches/watch-07.svg'}]);
    React.useEffect(()=>{ if(window.lucide) lucide.createIcons(); });
    return (<>
      <div className="row"><span className="lbl">BUTTONS</span>
        <Button variant="primary" trailingIcon={<Arr/>}>View New Models</Button>
        <Button variant="secondary">Contact a retailer</Button>
        <Button variant="ghost" size="sm">Clear all</Button>
        <Button variant="accent" trailingIcon={<Arr/>}>Download Catalogue</Button>
        <Button loading>Submitting</Button>
        <Button disabled>Disabled</Button>
      </div>
      <div className="row"><span className="lbl">ICON BUTTONS</span>
        <IconButton aria-label="Search" icon={I('search')} />
        <IconButton aria-label="Cart" variant="secondary" icon={I('shopping-bag')} />
        <IconButton aria-label="Add" variant="primary" icon={I('plus')} />
      </div>
      <div className="cols">
        <div style={{width:280}}>
          <span className="lbl" style={{display:'block',marginBottom:8}}>INPUTS</span>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <Input label="Search models" leadingAffix={I('search')} placeholder="Chronograph…" />
            <Input label="Password" type="password" error="Incorrect password" defaultValue="••••••" />
          </div>
        </div>
        <div style={{width:240}}>
          <span className="lbl" style={{display:'block',marginBottom:8}}>SELECT</span>
          <Select value={country} onChange={setCountry} placeholder="Select a country…" options={['United Kingdom','Russia','UAE','Iran']} />
        </div>
        <div>
          <span className="lbl" style={{display:'block',marginBottom:8}}>QUANTITY · MOQ</span>
          <QuantityStepper value={qty} onChange={setQty} moq={10} step={5} max={500} />
        </div>
      </div>
      <div className="row" style={{marginTop:18}}><span className="lbl">CHOICE CONTROLS</span>
        <Checkbox label="New models only" checked={chk} onChange={setChk} />
        <Checkbox label="Select all" indeterminate />
        <Radio name="ln" value="Classic" label="Classic" checked={line==='Classic'} onChange={setLine} />
        <Radio name="ln" value="Sport" label="Sport" checked={line==='Sport'} onChange={setLine} />
        <Switch label="Notify on restock" checked={sw} onChange={setSw} />
      </div>
      <div className="row" style={{marginTop:4}}><span className="lbl">IMAGE UPLOADER</span>
        <ImageUploader label="Product images" hint="PNG or JPG · up to 6" max={6} value={imgs} onChange={setImgs} />
      </div>
    </>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
