<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;font-family:var(--vt-font-sans);background:var(--vt-color-bg);padding:26px}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
  .lbl{font:500 11px var(--vt-font-mono);color:var(--vt-color-text-subtle);width:100%;margin-bottom:-4px}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { OrderStatusPill, Spinner, Skeleton, Tooltip, Toast, ToastViewport, Modal, Button, IconButton } = window.VioletDesignSystem_7273c4;
  function Demo(){
    const [open,setOpen] = React.useState(false);
    React.useEffect(()=>{ if(window.lucide) lucide.createIcons(); });
    const all = ['submitted','reviewing','approved','shipped','completed','rejected'];
    return (<>
      <div className="row"><span className="lbl">ORDER STATUS PILL</span>{all.map(s=><OrderStatusPill key={s} status={s} withIcon/>)}</div>
      <div className="row" style={{display:'flex',gap:40,alignItems:'center',flexWrap:'wrap'}}>
        <div><span className="lbl">SPINNER</span><div style={{display:'flex',gap:16,alignItems:'center'}}><Spinner/><Spinner size={28} thickness={3}/></div></div>
        <div><span className="lbl">TOOLTIP</span><Tooltip label="Add to cart"><IconButton aria-label="Add" variant="secondary" icon={<i data-lucide="plus" style={{width:18,height:18}}></i>}/></Tooltip></div>
        <div><span className="lbl">MODAL</span><Button variant="secondary" onClick={()=>setOpen(true)}>Open dialog</Button></div>
      </div>
      <div className="row" style={{display:'flex',gap:32,alignItems:'flex-start',flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:200}}><span className="lbl">SKELETON</span><Skeleton variant="card" style={{maxWidth:180}}/></div>
        <div style={{flex:1,minWidth:240}}><span className="lbl">TOAST</span>
          <Toast tone="success" title="Added to cart" description="20 × Chronograph Classic 42" onClose={()=>{}} />
        </div>
      </div>
      <Modal open={open} onClose={()=>setOpen(false)} title="Delete this model?" description="This deactivates the product; open orders are unaffected."
        footer={<><Button variant="ghost" onClick={()=>setOpen(false)}>Cancel</Button><Button variant="danger" onClick={()=>setOpen(false)}>Delete</Button></>}>
        VLT-2601 · Chronograph Classic 42 will be hidden from the catalog.
      </Modal>
    </>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
