<!-- @dsCard group="Reference Site" viewport="1280x780" name="Reference Site — vitrine" subtitle="Home · Catalog · Product detail · EN/RU/AR" -->
<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Violet — Reference Site</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--vt-font-sans);background:var(--vt-color-bg);color:var(--vt-color-text);-webkit-font-smoothing:antialiased}
  #vt-scroll{height:100vh;overflow-y:auto;scroll-behavior:smooth}
  .vt-navlink{position:relative;text-decoration:none}
  .vt-navlink::after{content:"";position:absolute;inset-inline-start:0;bottom:-6px;height:1.5px;width:0;background:var(--vt-color-accent);transition:width var(--vt-duration-slow)}
  .vt-navlink:hover::after{width:100%}
  .vt-float{animation:vt-float 7s ease-in-out infinite}
  @keyframes vt-float{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-20px) rotate(1deg)}}
  .vt-spin-slow{animation:vt-spin 40s linear infinite}
  .vt-spin-rev{animation:vt-spin 60s linear infinite reverse}
  @keyframes vt-spin{to{transform:rotate(360deg)}}
  .vt-aurora{animation:vt-aurora 18s ease-in-out infinite alternate}
  @keyframes vt-aurora{0%{transform:translate3d(0,0,0) scale(1)}100%{transform:translate3d(-30px,20px,0) scale(1.08)}}
  .vt-marquee{animation:vt-scroll 28s linear infinite}
  @keyframes vt-scroll{to{transform:translateX(-50%)}}
  .vt-linecard:hover img{transform:scale(1.07)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#0D0A1E"/>
    <rect x="30" y="30" width="40" height="40" rx="12" fill="url(#g)"/>
    <text x="50" y="64" font-family="Georgia, serif" font-size="30" fill="#fff" text-anchor="middle">V</text>
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A855F7"/><stop offset="1" stop-color="#7C3AED"/>
    </linearGradient></defs>
  </svg>
</template>
<div id="vt-scroll"><div id="root"></div></div>

<script src="data.js"></script>
<script type="text/babel" src="SiteChrome.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="CatalogScreen.jsx"></script>
<script type="text/babel" src="ProductScreen.jsx"></script>
<script type="text/babel">
  const { SiteHeader, SiteFooter, HomeScreen, CatalogScreen, ProductScreen } = window;

  function App(){
    const [screen, setScreen] = React.useState('home');
    const [product, setProduct] = React.useState(null);
    const scroller = () => document.getElementById('vt-scroll');

    const nav = (to) => { setScreen(to); scroller().scrollTo({ top: 0 }); };
    const open = (p) => { setProduct(p); setScreen('product'); scroller().scrollTo({ top: 0 }); };

    React.useEffect(() => { if (window.lucide) lucide.createIcons(); });

    const dark = screen === 'home';
    return (
      <div>
        <SiteHeader active={screen === 'product' ? 'catalog' : screen} onNav={nav} dark={dark} />
        {screen === 'home' && <HomeScreen onNav={nav} onOpen={open} />}
        {screen === 'catalog' && <CatalogScreen onOpen={open} />}
        {screen === 'product' && <ProductScreen product={product} onOpen={open} onNav={nav} />}
        <SiteFooter />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
