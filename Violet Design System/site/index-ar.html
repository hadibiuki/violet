<!doctype html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Violet · خالدة، أُعيد ابتكارها للحاضر</title>
<meta name="description" content="أكثر من ألف طراز من قياس الزمن الدقيق. اكتشف مجموعة Violet الجديدة.">
<link rel="stylesheet" href="../styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../_ds_bundle.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  html{scroll-behavior:smooth}
  /* Arabic typography: clean modern Kufi for display, Noto Sans for text */
  body{
    font-family:'Noto Sans Arabic',var(--vt-font-sans);
    background:var(--vt-color-bg);color:var(--vt-color-text);-webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{font-family:'Noto Kufi Arabic',var(--vt-font-display) !important;}
  .vt-navlink{position:relative}
  .vt-navlink::after{content:"";position:absolute;inset-inline-start:0;bottom:-6px;height:1.5px;width:0;background:var(--vt-color-accent);transition:width var(--vt-duration-slow)}
  .vt-navlink:hover::after{width:100%}
  .vt-float{animation:vt-float 7s ease-in-out infinite}
  @keyframes vt-float{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-20px) rotate(1deg)}}
  .vt-spin-slow{animation:vt-spin 40s linear infinite}
  .vt-spin-rev{animation:vt-spin 60s linear infinite reverse}
  @keyframes vt-spin{to{transform:rotate(360deg)}}
  .vt-aurora{animation:vt-aurora 18s ease-in-out infinite alternate}
  @keyframes vt-aurora{0%{transform:translate3d(0,0,0) scale(1)}100%{transform:translate3d(-30px,20px,0) scale(1.08)}}
  .vt-marquee{animation:vt-scroll 28s linear infinite}
  @keyframes vt-scroll{to{transform:translateX(-50%)}}
  .vt-linecard:hover img{transform:scale(1.07)}
  .vt-slide-in{animation:vt-slide-in .6s var(--vt-ease-standard) both}
  .vt-slide-img{animation:vt-slide-img .7s var(--vt-ease-standard) both}
  @keyframes vt-slide-in{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:none}}
  @keyframes vt-slide-img{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
  .reveal{opacity:0;transform:translateY(30px);transition:opacity .65s var(--vt-ease-standard),transform .65s var(--vt-ease-standard)}
  .reveal.in{opacity:1;transform:none}
  @media(prefers-reduced-motion:reduce){*{animation:none!important}.reveal{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script src="i18n.js"></script>
<script>window.VT_LANG = 'ar';</script>
<script type="text/babel" src="chrome-i18n.jsx"></script>
<script type="text/babel" src="home-i18n.jsx"></script>
</body>
</html>
