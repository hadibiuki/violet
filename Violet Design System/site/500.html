<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>500 · Something went wrong — Violet</title>
<meta name="description" content="An unexpected error occurred on our end.">
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../_ds_bundle.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--vt-font-sans);background:#0D0A1E;color:#fff;-webkit-font-smoothing:antialiased}
  .vt-navlink{position:relative}
  .vt-navlink::after{content:"";position:absolute;inset-inline-start:0;bottom:-6px;height:1.5px;width:0;background:var(--vt-color-accent);transition:width var(--vt-duration-slow)}
  .vt-navlink:hover::after{width:100%}
  .vt-aurora{animation:vt-aurora 18s ease-in-out infinite alternate}
  @keyframes vt-aurora{0%{transform:translate3d(0,0,0) scale(1)}100%{transform:translate3d(-30px,20px,0) scale(1.06)}}
  .vt-twinkle{animation:vt-twinkle 4s ease-in-out infinite}
  @keyframes vt-twinkle{0%,100%{opacity:.25}50%{opacity:.9}}
  .vt-rise{opacity:0;transform:translateY(24px);animation:vt-rise .8s var(--vt-ease-standard) forwards}
  @keyframes vt-rise{to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important}.vt-rise{opacity:1;transform:none}}
</style>
</head>
<body>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0D0A1E"/>
  <text x="50" y="56" font-family="Georgia, serif" font-size="30" fill="#C4B5FD" text-anchor="middle">500</text>
  <text x="50" y="74" font-family="Georgia, serif" font-size="7" fill="#E6B453" text-anchor="middle" letter-spacing="2">VIOLET</text>
</svg>
</template>
<div id="root"></div>

<script src="data.js"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="error-shell.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(
    <window.VioletErrorPage
      code="500"
      eyebrow="A movement skipped"
      title={<>Something went<br /><em style={{ fontStyle: 'italic', color: '#C4B5FD' }}>wrong on our end</em></>}
      body="An unexpected error stopped this page from loading. Our team has been notified — please try again in a moment, or head back home."
      primary={{ label: 'Try again', onClick: 'reload' }}
      secondary={{ label: 'Back to home', href: 'index.html' }}
    />
  );
</script>
</body>
</html>
