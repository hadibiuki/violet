<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact · Violet</title>
<meta name="description" content="Get in touch with Violet, or find an authorised dealer near you.">
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../_ds_bundle.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--vt-font-sans);background:var(--vt-color-bg);color:var(--vt-color-text);-webkit-font-smoothing:antialiased}
  .vt-navlink{position:relative}
  .vt-navlink::after{content:"";position:absolute;inset-inline-start:0;bottom:-6px;height:1.5px;width:0;background:var(--vt-color-accent);transition:width var(--vt-duration-slow)}
  .vt-navlink:hover::after{width:100%}
  .vt-field{font-family:var(--vt-font-sans);font-size:14px;color:var(--vt-color-text-strong);width:100%;background:var(--vt-color-surface);
    border:1.5px solid var(--vt-color-border-strong);border-radius:var(--vt-radius-sm);padding:0 14px;height:44px;outline:none;transition:border-color var(--vt-duration-base),box-shadow var(--vt-duration-base)}
  textarea.vt-field{height:auto;padding:12px 14px;resize:vertical;min-height:128px;font:inherit;line-height:1.6}
  .vt-field:focus{border-color:var(--vt-color-primary);box-shadow:var(--vt-shadow-focus)}
  .vt-field.err{border-color:var(--vt-color-danger)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel">
  const { SiteHeader, SiteFooter } = window;
  const { Button } = window.VioletDesignSystem_7273c4;

  const COUNTRIES = ['United Kingdom', 'Russia', 'United Arab Emirates', 'Iran', 'Germany', 'France', 'Turkey', 'Other'];

  function Field({ label, children, error, htmlFor }) {
    return (
      <label htmlFor={htmlFor} style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
        <span style={{ fontSize: 14, fontWeight: 500, color: 'var(--vt-color-text)' }}>{label}</span>
        {children}
        {error && <span style={{ fontSize: 12.5, color: 'var(--vt-color-danger)' }}>{error}</span>}
      </label>
    );
  }

  function ContactForm() {
    const empty = { name: '', company: '', country: '', email: '', message: '' };
    const [form, setForm] = React.useState(empty);
    const [errors, setErrors] = React.useState({});
    const [sent, setSent] = React.useState(false);
    const refs = { name: React.useRef(), company: React.useRef(), country: React.useRef(), email: React.useRef(), message: React.useRef() };

    const set = (k) => (e) => { setForm((f) => ({ ...f, [k]: e.target.value })); setErrors((er) => ({ ...er, [k]: undefined })); };

    const validate = () => {
      const e = {};
      if (!form.name.trim()) e.name = 'Please enter your name.';
      if (!form.company.trim()) e.company = 'Please enter your company.';
      if (!form.country) e.country = 'Please select a country.';
      if (!form.email.trim()) e.email = 'Please enter your email.';
      else if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(form.email)) e.email = 'That doesn’t look like a valid email.';
      if (!form.message.trim()) e.message = 'Please tell us a little about your enquiry.';
      return e;
    };

    const submit = (ev) => {
      ev.preventDefault();
      const e = validate();
      setErrors(e);
      const firstErr = ['name', 'company', 'country', 'email', 'message'].find((k) => e[k]);
      if (firstErr) { refs[firstErr].current && refs[firstErr].current.focus(); return; }
      setSent(true); // mock submit success
    };

    if (sent) {
      return (
        <div style={{ background: 'var(--vt-color-surface)', border: '1px solid var(--vt-color-border)', borderRadius: 'var(--vt-radius-xl)', padding: '48px 40px', textAlign: 'center', boxShadow: 'var(--vt-shadow-sm)' }}>
          <div style={{ width: 60, height: 60, margin: '0 auto 20px', borderRadius: '50%', background: 'var(--vt-color-success-bg)', color: 'var(--vt-color-success)', display: 'grid', placeItems: 'center' }}>
            <i data-lucide="check" style={{ width: 28, height: 28 }} ref={(el) => el && window.lucide && lucide.createIcons()}></i>
          </div>
          <h3 style={{ fontFamily: 'var(--vt-font-display)', fontWeight: 400, fontSize: 30, color: 'var(--vt-color-text-strong)', margin: '0 0 10px' }}>Thank you, {form.name.split(' ')[0]}</h3>
          <p style={{ fontSize: 16, color: 'var(--vt-color-text-muted)', lineHeight: 1.7, maxWidth: 420, margin: '0 auto 26px' }}>
            Your enquiry has reached the Violet team. We’ll be in touch at <b style={{ color: 'var(--vt-color-text)' }}>{form.email}</b> shortly — usually within two business days.
          </p>
          <Button variant="secondary" onClick={() => { setForm(empty); setSent(false); }}>Send another message</Button>
        </div>
      );
    }

    return (
      <form onSubmit={submit} noValidate style={{ background: 'var(--vt-color-surface)', border: '1px solid var(--vt-color-border)', borderRadius: 'var(--vt-radius-xl)', padding: '36px', boxShadow: 'var(--vt-shadow-sm)', display: 'flex', flexDirection: 'column', gap: 18 }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }}>
          <Field label="Full name" htmlFor="c-name" error={errors.name}>
            <input id="c-name" ref={refs.name} className={`vt-field${errors.name ? ' err' : ''}`} value={form.name} onChange={set('name')} placeholder="Your name" />
          </Field>
          <Field label="Company" htmlFor="c-company" error={errors.company}>
            <input id="c-company" ref={refs.company} className={`vt-field${errors.company ? ' err' : ''}`} value={form.company} onChange={set('company')} placeholder="Company or store" />
          </Field>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }}>
          <Field label="Country" htmlFor="c-country" error={errors.country}>
            <select id="c-country" ref={refs.country} className={`vt-field${errors.country ? ' err' : ''}`} value={form.country} onChange={set('country')} style={{ color: form.country ? 'var(--vt-color-text-strong)' : 'var(--vt-color-text-subtle)' }}>
              <option value="">Select a country…</option>
              {COUNTRIES.map((c) => <option key={c} value={c}>{c}</option>)}
            </select>
          </Field>
          <Field label="Email" htmlFor="c-email" error={errors.email}>
            <input id="c-email" ref={refs.email} type="email" className={`vt-field${errors.email ? ' err' : ''}`} value={form.email} onChange={set('email')} placeholder="you@company.com" />
          </Field>
        </div>
        <Field label="Message" htmlFor="c-message" error={errors.message}>
          <textarea id="c-message" ref={refs.message} className={`vt-field${errors.message ? ' err' : ''}`} value={form.message} onChange={set('message')} placeholder="Tell us about your enquiry — distribution, a specific model, or finding a dealer." />
        </Field>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 12.5, color: 'var(--vt-color-text-subtle)' }}>We’ll only use your details to respond to this enquiry.</span>
          <Button type="submit" variant="primary" size="lg" trailingIcon={<span>→</span>}>Send message</Button>
        </div>
      </form>
    );
  }

  function SideInfo() {
    const items = [
      ['mail', 'Email', 'partners@violet-watches.com'],
      ['phone', 'Phone', '+44 20 7946 0102'],
      ['map-pin', 'Head office', '12 Horology Row, London, UK'],
      ['clock', 'Hours', 'Mon–Fri · 09:00–18:00 GMT'],
    ];
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 28 }}>
        <div>
          <span style={{ fontSize: 12, letterSpacing: '.26em', textTransform: 'uppercase', color: 'var(--vt-color-accent-strong)', fontWeight: 500 }}>Find a dealer</span>
          <h2 style={{ fontFamily: 'var(--vt-font-display)', fontWeight: 300, fontSize: 34, color: 'var(--vt-color-text-strong)', margin: '12px 0 12px', letterSpacing: '-.02em' }}>Prefer to buy in person?</h2>
          <p style={{ fontSize: 15.5, lineHeight: 1.7, color: 'var(--vt-color-text-muted)' }}>
            Violet is carried by authorised retailers across Europe, Russia, and the Middle East. Tell us your country in the form and we’ll point you to your nearest dealer.
          </p>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          {items.map(([icon, label, value]) => (
            <div key={label} style={{ display: 'flex', gap: 14, alignItems: 'center', padding: '14px 0', borderTop: '1px solid var(--vt-color-divider)' }}>
              <span style={{ width: 40, height: 40, flex: 'none', borderRadius: 'var(--vt-radius-md)', background: 'var(--vt-color-primary-subtle)', color: 'var(--vt-color-primary)', display: 'grid', placeItems: 'center' }}>
                <i data-lucide={icon} style={{ width: 18, height: 18 }}></i>
              </span>
              <div>
                <div style={{ fontSize: 12.5, color: 'var(--vt-color-text-muted)' }}>{label}</div>
                <div style={{ fontSize: 15, fontWeight: 500, color: 'var(--vt-color-text-strong)' }}>{value}</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          {['languages', 'instagram', 'send'].map((ic, i) => (
            <span key={i} style={{ width: 40, height: 40, borderRadius: 'var(--vt-radius-md)', border: '1.5px solid var(--vt-color-border-strong)', display: 'grid', placeItems: 'center', color: 'var(--vt-color-text-muted)', cursor: 'pointer' }}>
              <i data-lucide={ic} style={{ width: 18, height: 18 }}></i>
            </span>
          ))}
        </div>
      </div>
    );
  }

  function Contact() {
    React.useEffect(() => { if (window.lucide) lucide.createIcons(); });
    return (
      <div>
        <SiteHeader active="contact" variant="overlay" />
        <header style={{ position: 'relative', overflow: 'hidden', background: 'var(--vt-color-brand-ink)', color: '#fff', paddingTop: 128 }}>
          <div aria-hidden="true" style={{ position: 'absolute', inset: 0, backgroundImage: 'url(../assets/brand/violet-floral.svg)', backgroundRepeat: 'repeat', backgroundSize: '150px', opacity: .1, pointerEvents: 'none' }} />
          <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', background: 'radial-gradient(900px 360px at 80% 40%, rgba(230,180,83,.10), transparent 60%)' }} />
          <div style={{ position: 'relative', zIndex: 2, maxWidth: 1200, margin: '0 auto', padding: '40px 40px 52px' }}>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', fontSize: 13, color: 'rgba(255,255,255,.6)', marginBottom: 18 }}>
              <a href="index.html" style={{ color: 'inherit', textDecoration: 'none' }}>Home</a><span style={{ color: 'var(--vt-color-brand-gold)' }}>›</span>
              <b style={{ color: '#fff', fontWeight: 500 }}>Contact</b>
            </div>
            <span style={{ fontSize: 12, letterSpacing: '.28em', textTransform: 'uppercase', color: 'var(--vt-color-brand-gold)', fontWeight: 500 }}>Get in touch</span>
            <h1 style={{ fontFamily: 'var(--vt-font-display)', fontWeight: 300, fontSize: 'clamp(44px,5.4vw,68px)', color: '#fff', margin: '14px 0 10px', letterSpacing: '-.02em', lineHeight: 1.02 }}>Contact Violet</h1>
            <p style={{ color: 'rgba(255,255,255,.66)', fontSize: 17, margin: 0, maxWidth: 560 }}>Distributor enquiries, dealer locations, or a question about a specific model — we’re glad to help.</p>
          </div>
        </header>
        <div style={{ maxWidth: 1200, margin: '0 auto', padding: '56px 40px 96px' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 56, alignItems: 'start' }}>
            <ContactForm />
            <SideInfo />
          </div>
        </div>
        <SiteFooter />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Contact />);
</script>
</body>
</html>
